<!DOCTYPE html>
<html>
<head>
  <title>Argia</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
      text-align: center;
    }

    .container {
      margin-top: 80px;
    }

    img.logo {
      width: 220px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 50px;
      color: #b30000;
      letter-spacing: 3px;
    }

    .product {
      margin-top: 60px;
    }

    .product img {
      width: 250px;
      border: 1px solid #222;
    }

    .price {
      font-size: 20px;
      margin: 10px 0;
    }

    .btn {
      padding: 12px 28px;
      border: 1px solid #b30000;
      color: #b30000;
      text-decoration: none;
      display: inline-block;
      margin-top: 10px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #b30000;
      color: white;
    }
  </style>
</head>

<body>

  <div class="container">
    <img src="logo.png" class="logo">
    <h1>ARGIA</h1>
    <p>Power. Precision. Presence.</p>

    <div class="product">
      <img src="product1.jpg">
      <h2>Argia Signature Piece</h2>
      <div class="price">$49.99</div>
      <a href="#" class="btn">Buy Now</a>
    </div>

  </div>

</body>
</html>
