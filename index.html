<!DOCTYPE html>
<html>
<head>
  <title>Argia</title>

  <!-- Google Font for luxury look -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      color: white;
      font-family: 'Playfair Display', serif;
      text-align: center;
    }

    .container {
      padding-top: 100px;
    }

    .logo {
      width: 280px;
      margin-bottom: 30px;
      box-shadow: 0 0 40px rgba(179,0,0,0.4);
    }

    h1 {
      font-size: 60px;
      letter-spacing: 6px;
      color: #b30000;
      margin: 10px 0;
    }

    p {
      color: #bbb;
      font-size: 18px;
      margin-bottom: 40px;
    }

    .btn {
      padding: 14px 40px;
      border: 1px solid #b30000;
      color: #b30000;
      text-decoration: none;
      font-size: 16px;
      letter-spacing: 2px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #b30000;
      color: white;
      box-shadow: 0 0 20px #b30000;
    }

    .divider {
      width: 60%;
      height: 1px;
      background: #222;
      margin: 80px auto;
    }

    .section {
      margin-bottom: 80px;
    }

  </style>
</head>

<body>

  <div class="container">
    <img src="logo.png" class="logo">

    <h1>ARGIA</h1>
    <p>Power. Precision. Presence.</p>

    <a href="#" class="btn">SHOP NOW</a>
  </div>

  <div class="divider"></div>

  <div class="section">
    <h2 style="color:#b30000;">COMING SOON</h2>
    <p>Luxury pieces built for presence.</p>
  </div>

</body>
</html>
